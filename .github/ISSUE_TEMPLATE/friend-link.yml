name: 申请友链
description: 自动校验回链并添加到 Iris 的友链列表
title: '[友链申请] '
labels:
  - friend-link
body:
  - type: markdown
    attributes:
      value: |
        提交前请先在你的友链页面添加本站。提交后机器人会检查页面和回链，通过后自动写入友链列表。

  - type: input
    id: site-name
    attributes:
      label: 网站名称
      placeholder: 灵的梦境
    validations:
      required: true

  - type: input
    id: site-url
    attributes:
      label: 网站链接
      description: 网站首页地址，必须使用 http 或 https。
      placeholder: https://example.com/
    validations:
      required: true

  - type: input
    id: friend-page-url
    attributes:
      label: 友链页面 URL
      description: 机器人将在此页面检查本站回链。
      placeholder: https://example.com/links/
    validations:
      required: true

  - type: input
    id: site-description
    attributes:
      label: 网站描述
      placeholder: 一句话介绍你的网站
    validations:
      required: true

  - type: input
    id: site-avatar
    attributes:
      label: 网站头像 URL
      description: 建议使用正方形图片，并确保允许外链访问。
      placeholder: https://example.com/avatar.png
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交确认
      options:
        - label: 我已在友链页面添加本站，并确认以上地址可以公开访问。
          required: true
